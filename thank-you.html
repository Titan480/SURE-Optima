<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | SURE Optima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Nav -->
  <nav>
    <div class="nav-inner">
      <span class="nav-brand"><span class="brand-sure">SURE</span> Optima</span>
      <a href="/" class="nav-cta">Back to Home</a>
    </div>
  </nav>

  <section class="thankyou-section">
    <div class="container thankyou-inner">
      <h1>Thank you for reaching out.</h1>
      <p>We'll be in touch soon.</p>
      <a href="/" class="btn">Back to Home</a>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container footer-inner">
      <span class="footer-brand">SURE Optima</span>
      <p class="copyright">&copy; 2026 SURE Optima. All rights reserved.</p>
    </div>
  </footer>

  <style>
    .thankyou-section {
      min-height: calc(100vh - 130px);
      display: flex;
      align-items: center;
      background: var(--black);
      color: var(--white);
      text-align: center;
      padding: 6rem 2rem;
    }

    .thankyou-inner {
      max-width: 600px;
    }

    .thankyou-inner h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .thankyou-inner p {
      font-size: 1.15rem;
      color: #cccccc;
      margin-bottom: 2.5rem;
    }
  </style>

</body>
</html>
